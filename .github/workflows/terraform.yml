name: Terraform

# Infra pipeline: fmt → validate → plan (on PRs), then a gated apply on main.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  (infra provisioning)
#   HF_API_TOKEN                               (TF_VAR_hf_api_token)

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: "true"

jobs:
  validate-plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Format
        run: terraform fmt -check -recursive
        continue-on-error: true
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_VAR_hf_api_token: ${{ secrets.HF_API_TOKEN }}

  apply:
    name: Apply (gated)
    needs: validate-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production # manual approval before any apply
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_hf_api_token: ${{ secrets.HF_API_TOKEN }}
